<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Compte | Unicorn-Multiplex</title>
<link rel="stylesheet" href="assets/unicorn.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">🦄 <span>Unicorn</span>-Multiplex</div>
        <ul class="nav-links">
            <li><a href="unicorn.html">Accueil</a></li>
            <li><a href="films.html">Films</a></li>
            <li><a href="seances.html">Séances</a></li>
            <li><a href="reservations.html">Réservations</a></li>
            <li><a href="utilisateurs.html" class="active">Compte</a></li>
        </ul>
    </nav>

    <main class="auth-page">
        <section class="hero">
            <h1>Espace Membre ✨</h1>
            <p>Connectez-vous pour gérer vos réservations en toute sécurité.</p>
        </section>

        <section class="auth-container">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Connexion</button>
                    <button class="tab-btn" onclick="switchTab('register')">Inscription</button>
                </div>

                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="email">Adresse Email</label>
                        <input type="email" id="email" placeholder="nom@exemple.com" required class="input-field">
                    </div>
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" placeholder="••••••••" required class="input-field">
                    </div>
                    <button type="submit" class="btn-select btn-full">Se connecter</button>
                    <p class="auth-footer">Mot de passe oublié ? <a href="#">Cliquez ici</a></p>
                </form>

                <form id="register-form" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <label for="reg-name">Nom complet</label>
                        <input type="text" id="reg-name" placeholder="Alice Unicorn" class="input-field">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Adresse Email</label>
                        <input type="email" id="reg-email" placeholder="nom@exemple.com" class="input-field">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Créer un mot de passe</label>
                        <input type="password" id="reg-password" placeholder="Minimum 8 caractères" class="input-field">
                    </div>
                    <button type="submit" class="btn-select btn-full">Créer mon compte</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Unicorn-Multiplex - Infrastructure de données centralisée</p>
    </footer>

    <script>
        function switchTab(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const buttons = document.querySelectorAll('.tab-btn');

            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (type === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                event.target.classList.add('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                event.target.classList.add('active');
            }
        }
    </script>
</body>
</html>
